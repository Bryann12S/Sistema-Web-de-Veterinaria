<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary"><i class="bi bi-people-fill"></i> Gestión de Usuarios</h2>
    <button class="btn btn-primary fw-bold rounded-pill shadow-sm" (click)="abrirModalCrear()">
      <i class="bi bi-person-plus-fill"></i> Crear Personal
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Cargando usuarios...</p>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden" *ngIf="!isLoading">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Cédula</th>
            <th>Rol</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuarios">
            <td>
              <div class="fw-bold">{{ u.nombre }} {{ u.apellidos }}</div>
              <small class="text-muted"><i class="bi bi-telephone"></i> {{ u.telefono || 'N/A' }}</small>
            </td>
            <td>{{ u.email }}</td>
            <td>{{ u.cedula || 'N/A' }}</td>
            <td><span class="badge bg-primary rounded-pill text-uppercase">{{ u.rol }}</span></td>
            <td>
              <span class="badge rounded-pill" [ngClass]="getColorEstado(u.estado)">
                {{ u.estado | titlecase }}
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-secondary me-2" (click)="abrirModalEditar(u)" title="Editar Datos">
                <i class="bi bi-pencil-fill"></i>
              </button>
              <button class="btn btn-sm" 
                      [ngClass]="u.estado === 'activo' ? 'btn-outline-danger' : 'btn-outline-success'" 
                      (click)="cambiarEstado(u.id, u.estado)"
                      [title]="u.estado === 'activo' ? 'Inactivar' : 'Activar'">
                <i class="bi" [ngClass]="u.estado === 'activo' ? 'bi-person-dash-fill' : 'bi-person-check-fill'"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Crear Personal -->
<div class="modal fade" id="modalCrearPersonal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header bg-primary text-white border-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-person-plus"></i> Añadir Personal</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <form (ngSubmit)="crearPersonal()" #formCrear="ngForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nombres</label>
              <input type="text" class="form-control" name="nombre" [(ngModel)]="nuevoPersonal.nombre" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Apellidos</label>
              <input type="text" class="form-control" name="apellidos" [(ngModel)]="nuevoPersonal.apellidos" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" name="email" [(ngModel)]="nuevoPersonal.email" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" name="password" [(ngModel)]="nuevoPersonal.password" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Rol</label>
              <select class="form-select" name="rol" [(ngModel)]="nuevoPersonal.rol">
                <option value="veterinario">Veterinario</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Cédula</label>
              <input type="text" class="form-control" name="cedula" [(ngModel)]="nuevoPersonal.cedula">
            </div>
          </div>
          <div class="text-end mt-3">
            <button type="button" class="btn btn-light me-2 fw-bold" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary fw-bold" [disabled]="!formCrear.valid">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal Editar Usuario -->
<div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header bg-secondary text-white border-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square"></i> Editar Datos de Usuario</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4" *ngIf="usuarioSeleccionado">
        <form (ngSubmit)="actualizarUsuario()" #formEditar="ngForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nombres</label>
              <input type="text" class="form-control" name="e_nombre" [(ngModel)]="usuarioSeleccionado.nombre" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Apellidos</label>
              <input type="text" class="form-control" name="e_apellidos" [(ngModel)]="usuarioSeleccionado.apellidos" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Cédula</label>
              <input type="text" class="form-control" name="e_cedula" [(ngModel)]="usuarioSeleccionado.cedula">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Teléfono</label>
              <input type="text" class="form-control" name="e_telefono" [(ngModel)]="usuarioSeleccionado.telefono">
            </div>
          </div>
          <div class="text-end mt-3">
            <button type="button" class="btn btn-light me-2 fw-bold" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-secondary fw-bold" [disabled]="!formEditar.valid">Actualizar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
