<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg" style="width: 450px; border-radius: 15px;">
    <div class="text-center mb-4">
      <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
      <h2 class="fw-bold">Registro</h2>
      <p class="text-muted">Únete a Huellitas Felices</p>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <form (ngSubmit)="onRegistro()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nombres</label>
          <input type="text" name="nombre" class="form-control" placeholder="Juan" [(ngModel)]="usuario.nombre" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Apellidos</label>
          <input type="text" name="apellidos" class="form-control" placeholder="Pérez" [(ngModel)]="usuario.apellidos" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" [(ngModel)]="usuario.email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="********" [(ngModel)]="usuario.password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar Contraseña</label>
        <input type="password" name="confirmPassword" class="form-control" placeholder="********" [(ngModel)]="usuario.confirmPassword" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Registrarme</button>
      <div class="text-center mt-3">
        <p class="mb-0">¿Ya tienes cuenta? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Inicia sesión</a></p>
      </div>
    </form>
  </div>
</div>
