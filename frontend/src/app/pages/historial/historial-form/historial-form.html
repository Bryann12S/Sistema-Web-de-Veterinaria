<div class="card shadow border-0">
  <div class="card-body">
    <form [formGroup]="historialForm" (ngSubmit)="onCrear()">
      <div class="mb-3">
        <label class="form-label">Selecciona la Mascota</label>
        <select formControlName="mascota_id" class="form-select">
          <option value="" disabled>-- Selecciona una mascota --</option>
          <option *ngFor="let m of mascotas" [value]="m.id">{{ m.nombre }}</option>
        </select>
        <div *ngIf="historialForm.get('mascota_id')?.invalid && historialForm.get('mascota_id')?.touched" class="text-danger small mt-1">
          Debes seleccionar una mascota.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Cita Asociada (opcional)</label>
        <select formControlName="cita_id" class="form-select">
          <option value="">-- Sin cita asociada --</option>
          <option *ngFor="let c of citas" [value]="c.id">{{ c.fecha | date:'dd/MM/yyyy' }} - {{ c.nombre_mascota }} - {{ c.motivo }}</option>
        </select>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Peso (kg)</label>
          <input type="number" step="0.01" formControlName="peso" class="form-control" placeholder="Ej. 12.5">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Temperatura (°C)</label>
          <input type="number" step="0.1" formControlName="temperatura" class="form-control" placeholder="Ej. 38.5">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Diagnóstico</label>
        <textarea formControlName="diagnostico" class="form-control" rows="3" placeholder="Describe el diagnóstico o hallazgos..."></textarea>
        <div *ngIf="historialForm.get('diagnostico')?.invalid && historialForm.get('diagnostico')?.touched" class="text-danger small mt-1">
          El diagnóstico es requerido.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Tratamiento</label>
        <textarea formControlName="tratamiento" class="form-control" rows="3" placeholder="Tratamiento prescrito..."></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Notas Adicionales</label>
        <textarea formControlName="notas" class="form-control" rows="3" placeholder="Observaciones adicionales..."></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Próxima Visita</label>
        <input type="date" formControlName="proxima_visita" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="historialForm.invalid">Crear Historial</button>
    </form>
  </div>
</div>
