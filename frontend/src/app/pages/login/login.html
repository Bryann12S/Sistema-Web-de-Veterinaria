<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg" style="width: 400px; border-radius: 15px;">
    <div class="text-center mb-4">
      <i class="bi bi-paw-fill text-primary" style="font-size: 3rem;"></i>
      <h2 class="fw-bold">Huellitas Felices</h2>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" [(ngModel)]="credentials.email">
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="********" [(ngModel)]="credentials.password">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
      <div class="text-center mt-3">
        <p class="mb-0">¿No tienes cuenta? <a routerLink="/registro" class="text-primary fw-bold text-decoration-none">Regístrate aquí</a></p>
      </div>
    </form>
  </div>
</div>
