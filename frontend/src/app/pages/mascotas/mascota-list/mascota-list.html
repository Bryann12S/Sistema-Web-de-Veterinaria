<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary">
      <i class="bi bi-dog"></i> 
      {{ rol === 'cliente' ? 'Mis Mascotas' : 'Pacientes Registrados' }}
    </h2>
    <!-- Solo el cliente o admin puede registrar mascotas nuevas según tu lógica -->
    <button class="btn btn-success" *ngIf="rol !== 'veterinario'" [routerLink]="['/app/mascotas-form']">
      <i class="bi bi-plus-lg"></i> Nueva Mascota
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Raza</th>
            <th *ngIf="rol !== 'cliente'">Dueño</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let mascota of mascotas">
            <td class="fw-bold">{{ mascota.nombre }}</td>
            <td><span class="badge bg-info text-dark">{{ mascota.especie }}</span></td>
            <td>{{ mascota.raza }}</td>
            <td *ngIf="rol !== 'cliente'">{{ mascota.duenio_nombre || 'Ver en detalle' }}</td>
            <td class="text-center">
              <div class="btn-group">
                <button class="btn btn-sm btn-outline-primary" [routerLink]="['/historial', mascota.id]">
                  <i class="bi bi-file-medical"></i>
                </button>

                <button class="btn btn-sm btn-outline-warning" 
                        [routerLink]="['/app/mascotas/editar', mascota.id]">
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button class="btn btn-sm btn-outline-danger" 
                        *ngIf="rol === 'admin'"
                        (click)="eliminarMascota(mascota.id)">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
          </td>
          </tr>
          <tr *ngIf="mascotas.length === 0">
            <td colspan="5" class="text-center py-4 text-muted">No se encontraron mascotas registradas.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
